<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        h1 { color: #1a73e8; }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #1557b0; }
        #message { margin-top: 20px; font-weight: bold; color: #d93025; }
    </style>
</head>
<body>

    <div class="card">
        <h1>My First Website</h1><br>
        <img src="Nasir.jpg" alt="Nasir's Photo" width="500" height="600">
        <p>Using Github and Vercel</p>
        <p>This app was built without installing any software!</p>
        <button onclick="showAlert()">Click Me</button>
        <div id="message"></div>
    </div>

    <script>
        function showAlert() {
    const msg = document.getElementById('message');
    
    // Instead of text, we insert an image tag
    msg.innerHTML = '<img src="Signature-Nasir.jpg" alt="Signature" style="max-width: 100%; height: auto; border: 1px solid #ccc; margin-top: 10px;">';
    
    console.log("Signature displayed at: " + new Date().toLocaleTimeString());
}
    </script>
</body>
</html>
